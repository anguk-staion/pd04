<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLAYDAY - 나만의 여행계획 자랑하기</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }
    .poster {
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      line-height: 0;
    }
    .poster img {
      display: block;
      width: 100%;
      height: auto;
    }
    /* 버튼 영역에 링크만 거는 투명 오버레이 (음영/애니메이션 없음) */
    .poster a.hotspot {
      position: absolute;
      display: block;
      background: transparent;
      border: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }
    /* 좌측: 여행 계획서 만들기 (HAI 활용) */
    .poster a.btn-make {
      left: 33.45%;
      top: 84.92%;
      width: 26.27%;
      height: 4.56%;
    }
    /* 우측: 동료 작품 보러가기 (Playday Gallery) */
    .poster a.btn-friends {
      left: 63.73%;
      top: 84.92%;
      width: 26.27%;
      height: 4.56%;
    }
  </style>
</head>
<body>
  <div class="poster">
    <img src="PD04_R1.png" alt="PLAYDAY - 바이브코딩과 함께, 나만의 여행 계획 자랑하기" />
    <a class="hotspot btn-make"
       href="plan.html"
       target="_blank" rel="noopener"
       aria-label="여행 계획서 만들기"></a>
    <a class="hotspot btn-friends"
       href="https://hmap.hdec.co.kr/HMAP/Authentication/HMAPAccess.aspx?popupUrl=PLAYGALLERY"
       target="_blank" rel="noopener"
       aria-label="동료 작품 보러가기"></a>
  </div>
</body>
</html>
